<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="../js/script.js"></script>
</head>

<body style="
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right, #1f24d1, #4d74d8);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
">

    <div style="
        background: white;
        width: 350px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        text-align: center;
    ">

        <h1 style="
            color: #1f24d1;
            margin-bottom: 30px;
        ">
            Login
        </h1>

        <input 
            type="text"
            id="email"
            placeholder="Digite seu email"
            style="
                width: 90%;
                padding: 15px;
                margin-bottom: 20px;
                border-radius: 10px;
                border: 1px solid #ccc;
                font-size: 16px;
            "
        >

        <input 
            type="text"
            id="senha"
            placeholder="Digite sua senha"
            style="
                width: 90%;
                padding: 15px;
                margin-bottom: 25px;
                border-radius: 10px;
                border: 1px solid #ccc;
                font-size: 16px;
            "
        >

        <button onclick="fazerLogin()" style="
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #1f24d1, #4d74d8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        ">
            Entrar
        </button>

        <p id="mensagem" style="
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
        "></p>

    </div>

</body>
</html>
