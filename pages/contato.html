<!DOCTYPE html>
<html lang="PT-BR">
<head>

<body class="body2">

    <header class="header">
        <h1 class="titulo">Quer entrar em<strong> CONTATO</strong>?</h1>

<main>


    <section class="cards2" id="beneficios">

            <div class="card">
                <span class="icone">📞</span>
               
                <h3>Telefone</h3>
                <p>Você pode ligar a qualquer hora.</p>
                <strong>40028922</strong>
            </div>
            
            <div class="card">
                <span class="icone">💬</span>
               
                <h3>Chat</h3>
                <p>Precisa de uma ajuda agora?</p>
                <strong>Basta abrir nosso app</strong>
            </div>
            
            <div class="card">
                <span class="icone">✉️</span>

                <p>Temos nosso email também!</p>
                <strong>Horizon@email.com</strong>
            </div>
    

    

    </section>

    
         <section class="celular">
    
            <div class="celular-texto2">
    
                <h2 id="cabecario2">
                <strong>Horizon</strong>
                </h2>
    
                <p id="cabecario2" class="fonte">
                Sempre a disposição da sua camera!
                </p>
    
            </div>
        </section>

    <form class="centro">
        <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu melhor e-mail">
   

     <div class="campo">
        <label for="duvida">Sua dúvida</label>
        <textarea id="duvida" placeholder="Como podemos te ajudar?"></textarea>
     </div>

  <button type="submit">Enviar Mensagem</button>
</form>
    

</main>

 <a href="../index.html" class="btn botao-contato">Menu principal
